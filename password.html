		<main>
			<section class="intro section">
				<h1 class="title home-title" data-en="Vigenère Cipher"><span class="text">Chiffre de Vigenère</span></h1>
				<h2 class="title-discription">加密與解密工具 - Encrypt & Decrypt Tool</h2>
			</section>

			<section class="intro-text section cipher-container">
				<div class="cipher-input-group">
					<label for="plaintext"><span class="eng">Text to Encrypt/Decrypt:</span> 文本</label>
					<textarea id="plaintext" placeholder="Enter text here / 在這裡輸入文本"></textarea>
					<div class="info-text">Enter the text you want to encrypt or decrypt / 輸入要加密或解密的文本</div>
				</div>

				<div class="cipher-input-group">
					<label for="key"><span class="eng">Key:</span> 密鑰</label>
					<input type="text" id="key" placeholder="Enter encryption key / 輸入密鑰" />
					<div class="info-text">The key must contain only letters / 密鑰必須只包含字母</div>
				</div>

				<div class="cipher-buttons">
					<button onclick="encryptText()"><span class="eng">Encrypt</span> 加密</button>
					<button onclick="decryptText()"><span class="eng">Decrypt</span> 解密</button>
				</div>

				<div class="cipher-output" id="output" style="display: none;">
					<h3><span class="eng">Result:</span> 結果</h3>
					<p id="result"></p>
				</div>

		<script>
			function vigenereEncrypt(text, key) {
				text = text.toUpperCase();
				key = key.toUpperCase();
				let result = '';
				let keyIndex = 0;

				for (let i = 0; i < text.length; i++) {
					const char = text[i];
					if (/[A-Z]/.test(char)) {
						const charCode = char.charCodeAt(0) - 'A'.charCodeAt(0);
						const keyChar = key[keyIndex % key.length];
						const keyCode = keyChar.charCodeAt(0) - 'A'.charCodeAt(0);
						const encrypted = (charCode + keyCode) % 26;
						result += String.fromCharCode(encrypted + 'A'.charCodeAt(0));
						keyIndex++;
					} else if (/[0-9]/.test(char)) {
						result += char;
					} else {
						result += char;
					}
				}
				return result;
			}

			function vigenereDecrypt(text, key) {
				text = text.toUpperCase();
				key = key.toUpperCase();
				let result = '';
				let keyIndex = 0;

				for (let i = 0; i < text.length; i++) {
					const char = text[i];
					if (/[A-Z]/.test(char)) {
						const charCode = char.charCodeAt(0) - 'A'.charCodeAt(0);
						const keyChar = key[keyIndex % key.length];
						const keyCode = keyChar.charCodeAt(0) - 'A'.charCodeAt(0);
						const decrypted = (charCode - keyCode + 26) % 26;
						result += String.fromCharCode(decrypted + 'A'.charCodeAt(0));
						keyIndex++;
					} else if (/[0-9]/.test(char)) {
						result += char;
					} else {
						result += char;
					}
				}
				return result;
			}

			function encryptText() {
				const plaintext = document.getElementById('plaintext').value;
				const key = document.getElementById('key').value;

				if (!plaintext || !key) {
					alert('Please enter both text and key / 請輸入文本和密鑰');
					return;
				}

				if (!/^[A-Za-z]+$/.test(key)) {
					alert('Key must contain only letters / 密鑰必須只包含字母');
					return;
				}

				const encrypted = vigenereEncrypt(plaintext, key);
				displayResult(encrypted);
			}

			function decryptText() {
				const plaintext = document.getElementById('plaintext').value;
				const key = document.getElementById('key').value;

				if (!plaintext || !key) {
					alert('Please enter both text and key / 請輸入文本和密鑰');
					return;
				}

				if (!/^[A-Za-z]+$/.test(key)) {
					alert('Key must contain only letters / 密鑰必須只包含字母');
					return;
				}

				const decrypted = vigenereDecrypt(plaintext, key);
				displayResult(decrypted);
			}

			function displayResult(result) {
				document.getElementById('result').textContent = result;
				document.getElementById('output').style.display = 'block';
			}

			// Allow Enter key for encryption
			document.getElementById('key').addEventListener('keypress', function(e) {
				if (e.key === 'Enter') {
					encryptText();
				}
			});

			document.getElementById('plaintext').addEventListener('keydown', function(e) {
				if (e.key === 'Enter' && e.ctrlKey) {
					encryptText();
				}
			});
		</script>
